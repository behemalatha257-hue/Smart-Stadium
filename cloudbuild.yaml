steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/stadium-pulse:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stadium-pulse:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy stadium-pulse \
          --image gcr.io/$PROJECT_ID/stadium-pulse:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --port 8080
images:
  - 'gcr.io/$PROJECT_ID/stadium-pulse:latest'
